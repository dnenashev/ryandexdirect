name: Weekly Campaign Stats to Google Sheets

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-stats:
    runs-on: ubuntu-latest
    env:
      YANDEX_ACCOUNTS: ${{ secrets.YANDEX_ACCOUNTS }}
      YANDEX_DIRECT_TOKEN: ${{ secrets.YANDEX_DIRECT_TOKEN }}
      YANDEX_DIRECT_LOGIN: ${{ secrets.YANDEX_DIRECT_LOGIN }}
      GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SA_KEY:       ${{ secrets.GOOGLE_SA_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('scripts/weekly_campaign_stats.R') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c(
            "httr", "jsonlite", "dplyr", "tidyr", "purrr",
            "readr", "data.table", "googlesheets4", "gargle"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Run weekly stats export
        run: Rscript scripts/weekly_campaign_stats.R
